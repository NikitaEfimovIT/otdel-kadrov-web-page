# Стек CMS: Strapi + PostgreSQL + Caddy (авто-HTTPS). Всё на одной VM.
# Запуск: docker compose up -d --build
# Файлы Dockerfile / .env лежат рядом, в корне Strapi-проекта.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks: [internal]

  strapi:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
    depends_on: [db]
    networks: [internal]
    # Наружу порт не открываем — трафик идёт только через Caddy.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [strapi]
    networks: [internal]

volumes:
  db-data:
  caddy-data:
  caddy-config:

networks:
  internal:
